<!-- 可选：把 window.RAG_CONFIG.endpoint 指向你的 serverless LLM 代理即可开启「生成式」回答 -->

<style>

        <div style="font-size:13px;font-weight:600;color:#22293A">IR 实习生</div>

    </div>

  <!-- BODY -->

      <div style="margin-top:auto;background:#F7F8FA;border:1px solid #EDEFF3;border-radius:12px;padding:13px 14px">
        <div style="font-size:11px;font-weight:700;color:#8B93A3;margin-bottom:9px">服务范围</div>
        <div style="display:flex;flex-direction:column;gap:7px">
          <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:#22293A"><span style="width:6px;height:6px;border-radius:50%;background:#0E9F6E"></span>品牌部</div>
          <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:#22293A"><span style="width:6px;height:6px;border-radius:50%;background:#0E9F6E"></span>融资部</div>
        </div>
        <div style="margin-top:10px;padding-top:9px;border-top:1px dashed #E2E5EB;font-size:11px;color:#9AA1AF">其他部门默认不可见</div>
      </div>
    </div>
    <!-- MAIN -->
    <div style="flex:1;min-width:0;overflow:auto">
      <div id="main" style="max-width:1120px;margin:0 auto;padding:28px 32px 64px"></div>
    </div>

</div>

<script>
"use strict";
const AC = "#315CF0";
const KB   = (window.KB_DATA && window.KB_DATA.items) ? window.KB_DATA.items.slice() : [];
const META = (window.KB_DATA && window.KB_DATA.meta) || {};
const NOW  = new Date("2026-07-13");

// ---------- persistence ----------
const LS = {
  added: JSON.parse(localStorage.getItem("oran_added") || "[]"),
  stars: new Set(JSON.parse(localStorage.getItem("oran_stars") || "[]")),
  qc:    +(localStorage.getItem("oran_qc") || 0),
};
const persist = {
  added(){ localStorage.setItem("oran_added", JSON.stringify(LS.added)); },
  stars(){ localStorage.setItem("oran_stars", JSON.stringify([...LS.stars])); },
  qc(){ localStorage.setItem("oran_qc", String(LS.qc)); },
};
const allItems = () => LS.added.concat(KB);

// ---------- helpers ----------
const CATCOLOR = {
  "竞品":{c:"#7A3E9D",bg:"#F3EAFA"}, "行业":{c:"#12306E",bg:"#EAF0FE"},
  "政策":{c:"#B4770E",bg:"#FBF3E2"}, "客户":{c:"#0E7A54",bg:"#E6F6EF"},
  "消费者":{c:"#B5385E",bg:"#FCE9F0"}, "待分类":{c:"#5B6473",bg:"#F1F3F7"},
};
const catBadge = (cat) => { const m = CATCOLOR[cat]||CATCOLOR["行业"]; return `background:${m.bg};color:${m.c}`; };
const esc = (s)=> (s||"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const parseDate = (d)=> new Date((d && d.length===7) ? d+"-15" : (d||"2026-01-01"));
const daysAgo = (d)=> Math.round((NOW - parseDate(d))/864e5);
const relTime = (d)=>{ const n=daysAgo(d); if(n<=0)return"今天"; if(n===1)return"昨天"; if(n<7)return n+"天前"; if(n<35)return Math.round(n/7)+"周前"; return Math.round(n/30)+"个月前"; };

// ---------- RAG: TF-IDF retrieval over the knowledge base ----------
function tokenize(t){
  t=(t||"").toLowerCase(); const out=[];
  (t.match(/[a-z0-9]+/g)||[]).forEach(w=>{ if(w.length>1) out.push(w); });
  (t.match(/[一-鿿]+/g)||[]).forEach(run=>{
    for(let i=0;i<run.length;i++){ out.push(run[i]); if(i<run.length-1) out.push(run.slice(i,i+2)); }
  });
  return out;
}
let _index=null, _indexLen=-1;
function buildIndex(){
  const items = allItems();
  // field weighting: title×3, tags×3, company×2 rank higher than body
  const docs = items.map(it => {
    const tit=tokenize(it.title), tag=tokenize((it.tags||[]).join(" ")), com=tokenize(it.company||"");
    return [].concat(tit,tit,tit, tag,tag,tag, com,com, tokenize(it.summary), tokenize(it.body), tokenize(it.category||""));
  });
  const df = {};
  docs.forEach(d => { new Set(d).forEach(t => df[t]=(df[t]||0)+1); });
  const N = docs.length || 1;
  const idf = t => Math.log(1 + N/((df[t]||0)+0.5));
  const vecs = docs.map(d => {
    const tf={}; d.forEach(t=>tf[t]=(tf[t]||0)+1);
    const v={}; let n=0;
    for(const t in tf){ const w=tf[t]*idf(t); v[t]=w; n+=w*w; }
    return { v, norm:Math.sqrt(n)||1 };
  });
  _index = { items, idf, vecs }; _indexLen = items.length;
}
function retrieve(q, k=4){
  if(!_index || _indexLen!==allItems().length) buildIndex();
  const qt = tokenize(q); if(!qt.length) return [];
  const tf={}; qt.forEach(t=>tf[t]=(tf[t]||0)+1);
  const qv={}; let qn=0;
  for(const t in tf){ const w=tf[t]*_index.idf(t); qv[t]=w; qn+=w*w; } qn=Math.sqrt(qn)||1;
  const scored = _index.vecs.map((dv,i)=>{
    let dot=0; for(const t in qv){ if(dv.v[t]) dot+=qv[t]*dv.v[t]; }
    return { it:_index.items[i], score: dot/(qn*dv.norm) };
  }).filter(r=>r.score>0.02).sort((a,b)=>b.score-a.score);
  return scored.slice(0,k);
}
async function answer(q){
  const res = retrieve(q, 4);
  if(!res.length){
    return { text:"知识库中暂未检索到与该问题直接相关的情报。可换个说法，或先在「情报收集」拉取更多数据后再问。", cites:[] };
  }
  const cites = res.map((r,i)=>({ n:i+1, label:(r.it.company||r.it.category)+" · "+(r.it.title.length>18?r.it.title.slice(0,18)+"…":r.it.title), url:r.it.url }));
  // 生成式（可选）：配置了 endpoint 就走 LLM 代理
  const ep = window.RAG_CONFIG && window.RAG_CONFIG.endpoint;
  if(ep){
    try{
      const r = await fetch(ep,{ method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ question:q, contexts:res.map(x=>({title:x.it.title,summary:x.it.summary,body:x.it.body,url:x.it.url,company:x.it.company,date:x.it.date})) }) });
      const j = await r.json();
      if(j && j.answer) return { text:j.answer, cites };
    }catch(e){ /* 回退到抽取式 */ }
  }
  // 抽取式（零后端，默认）
  const lines = res.map((r,i)=> `【${i+1}】${r.it.company?r.it.company+"：":""}${r.it.title}\n　　${r.it.summary}`);
  const cats = [...new Set(res.map(r=>r.it.category))];
  const text = `基于知识库检索到 ${res.length} 条相关情报（涉及 ${cats.join("、")}），摘取最相关的 ${res.length} 条：\n\n`
    + lines.join("\n\n")
    + `\n\n小结：以上情报可支撑对「${q.trim()}」的判断；点开下方引用可回溯原文来源。`;
  return { text, cites };
}

// ---------- state ----------
const S = {
  view: "overview",
  intel: { period:"本季度", cat:"全部", status:"idle", results:[] },
  kb: { cat:"全部", q:"" },
  chat: { msgs:[{ role:"assistant", text:"你好，我是 OranAI 情报助手。我会基于已入库的竞品、行业、政策、甲方客户与消费者情报回答问题，并附引用来源。试试下面的推荐问题，或直接提问。", cites:[] }], thinking:false },
  modal:false,
};

// ---------- nav ----------
const NAVS = [
  ["overview","工作台",'<rect x="2.5" y="2.5" width="5.5" height="5.5" rx="1.2"/><rect x="10" y="2.5" width="5.5" height="5.5" rx="1.2"/><rect x="2.5" y="10" width="5.5" height="5.5" rx="1.2"/><rect x="10" y="10" width="5.5" height="5.5" rx="1.2"/>'],
  ["intel","情报收集",'<path d="M2 10h3l2-6 3.5 11L13 10h3"/>'],
  ["kb","知识库",'<rect x="3" y="2.5" width="12" height="13" rx="1.4"/><line x1="6.5" y1="2.5" x2="6.5" y2="15.5"/>'],
  ["chat","智能问答",'<path d="M3 5.5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2V11a2 2 0 0 1-2 2H8l-3.5 2.6V13H5a2 2 0 0 1-2-2z"/>'],
  ["access","权限与成员",'<rect x="3.5" y="7.5" width="11" height="7.5" rx="1.4"/><path d="M5.5 7.5V5.5a3.5 3.5 0 0 1 7 0v2"/>'],
];
function renderNav(){
  document.getElementById("navBox").innerHTML = NAVS.map(([v,label,svg])=>
    `<div class="nav ${S.view===v?'on':''}" onclick="app.go('${v}')">
      <svg width="17" height="17" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${svg}</svg>
      <span>${label}</span></div>`).join("");
}

// ---------- views ----------
function itemCard(it, idx){
  const starred = LS.stars.has(it.id);
  return `<div class="card" style="padding:16px 18px;animation:fadeUp .3s ease both">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <span class="badge" style="${catBadge(it.category)}">${it.category}${it.company?" · "+esc(it.company):""}</span>
      <span style="font-size:12px;color:#AAB0BC">${esc(it.source)} · ${relTime(it.date)}</span>
    </div>
    <div style="font-size:14.5px;font-weight:600;color:#1A2233;line-height:1.5;margin-bottom:6px">${esc(it.title)}</div>
    <div style="font-size:13px;color:#6A7280;line-height:1.6;margin-bottom:12px">${esc(it.summary)}</div>
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;gap:6px;flex-wrap:wrap">${(it.tags||[]).slice(0,3).map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</div>
      <div style="display:flex;gap:8px">
        ${it.url?`<a href="${esc(it.url)}" target="_blank" rel="noopener" style="font-size:12px;font-weight:600">原文 ↗</a>`:""}
        <button onclick="app.star('${it.id}')" style="padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid ${starred?'#F1C8A0':'#C9D6FB'};color:${starred?'#B4770E':AC};background:${starred?'#FBF3E2':'#fff'}">${starred?'★ 已关注':'☆ 关注'}</button>
      </div>
    </div></div>`;
}

function viewOverview(){
  const items = allItems();
  const comps = new Set(items.filter(i=>i.category==="竞品").map(i=>i.company)).size;
  const quarter = filterIntel("本季度","全部").length;
  const feed = items.slice().sort((a,b)=>parseDate(b.date)-parseDate(a.date)).slice(0,5);
  const stats = [["知识库条目",items.length,"条"],["本季度情报",quarter,"条"],["监测竞品",comps,"家"],["重点关注",LS.stars.size,"条"]];
  return `
  <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px">
    <div><h1>工作台</h1><div style="margin-top:6px;font-size:13px;color:#8B93A3">OranAI 品牌 / 融资情报中台 · 数据更新于 ${esc(META.generated||"—")}</div></div>
    <div style="font-size:13px;color:#8B93A3">2026年7月13日 · 周一</div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:16px">
    ${stats.map(([l,v,u])=>`<div class="card" style="padding:17px 18px">
      <div style="font-size:12.5px;color:#8B93A3;margin-bottom:10px">${l}</div>
      <div style="display:flex;align-items:baseline;gap:4px"><span style="font-size:27px;font-weight:700">${v}</span><span style="font-size:13px;color:#8B93A3">${u}</span></div></div>`).join("")}
  </div>
  <div style="display:grid;grid-template-columns:1.45fr 1fr;gap:16px">
    <div class="card" style="padding:20px 22px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <span style="font-size:15px;font-weight:700">最新情报速览</span>
        <span onclick="app.go('intel')" style="font-size:13px;color:${AC};cursor:pointer">查看全部 →</span></div>
      <div>${feed.map(f=>`<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid #F0F1F4">
        <span class="badge" style="${catBadge(f.category)}">${f.category}</span>
        <span style="flex:1;font-size:13.5px;color:#22293A;line-height:1.5">${esc(f.title)}</span>
        <span style="font-size:12px;color:#AAB0BC;white-space:nowrap">${relTime(f.date)}</span></div>`).join("")}</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="card" style="padding:20px 22px">
        <div style="font-size:15px;font-weight:700;margin-bottom:14px">快捷操作</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <button class="btn" onclick="app.go('intel');app.pull()">⚡ 一键拉取情报</button>
          <button class="btn out" onclick="app.openModal()">＋ 添加到知识库</button>
          <button class="btn out" onclick="app.go('chat')">💬 向知识库提问</button>
        </div>
      </div>
      <div class="card" style="padding:20px 22px">
        <div style="font-size:13px;font-weight:700;color:#8B93A3;margin-bottom:10px">数据源覆盖</div>
        <div style="font-size:12.5px;color:#6A7280;line-height:1.9">竞品官网/融资 · 36氪/界面/虎嗅 · 平台政策(Meta/Google/TikTok) · 甲方客户动态 · 小红书/抖音消费趋势</div>
      </div>
    </div>
  </div>`;
}

function filterIntel(period, cat){
  const days = {"今日":2,"本周":9,"本月":35,"本季度":100}[period] || 100;
  let items = allItems().filter(it => cat==="全部" || it.category===cat);
  let within = items.filter(it => daysAgo(it.date) <= days);
  if(!within.length) within = items.slice(0,6);
  return within.sort((a,b)=>parseDate(b.date)-parseDate(a.date));
}
function viewIntel(){
  const cats = ["全部","竞品","行业","政策","客户","消费者"];
  const st = S.intel;
  let body="";
  if(st.status==="idle"){
    body = `<div class="card" style="border-style:dashed;border-color:#D8DCE4;padding:56px 20px;text-align:center">
      <div style="font-size:15px;color:#5B6473;font-weight:600;margin-bottom:6px">选择周期与分类后点击「一键拉取」</div>
      <div style="font-size:13px;color:#9AA1AF">系统从知识库按时间与分类聚合、去重后输出情报流（真实数据由 ingest.py 定时抓取写入）</div></div>`;
  } else if(st.status==="loading"){
    body = `<div class="card" style="padding:22px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
        <span style="width:18px;height:18px;border:2px solid #E8EAEF;border-top-color:${AC};border-radius:50%;display:inline-block;animation:spin .7s linear infinite"></span>
        <span style="font-size:14px;color:#5B6473">正在按「${st.period} · ${st.cat}」聚合与去重…</span></div>
      ${[1,2,3].map(()=>`<div style="padding:14px 0;border-top:1px solid #F0F1F4"><div style="height:13px;width:62%;background:#EDEFF3;border-radius:6px;margin-bottom:10px"></div><div style="height:10px;width:88%;background:#F1F3F7;border-radius:6px"></div></div>`).join("")}</div>`;
  } else {
    const r = st.results;
    body = `<div style="display:flex;align-items:center;justify-content:space-between;background:#EAF0FE;border:1px solid #D6E1FC;border-radius:10px;padding:11px 16px;margin-bottom:18px">
      <span style="font-size:13px;color:#12306E">本次聚合 <b>${r.length}</b> 条（已去重）· 数据版本 ${esc(META.generated||"—")}</span>
      <span style="font-size:12px;color:#4B69B8">${st.period} · ${st.cat}</span></div>
      <div style="display:flex;flex-direction:column;gap:12px">${r.map(itemCard).join("")}</div>`;
  }
  return `
  <div style="margin-bottom:20px"><h1>情报收集</h1>
    <div style="margin-top:6px;font-size:13px;color:#8B93A3">按周期/分类拉取 AI 营销行业情报（竞品·行业·政策·甲方客户·消费者），可关注入库</div></div>
  <div class="card" style="padding:18px 20px;margin-bottom:18px">
    <div style="display:flex;align-items:center;flex-wrap:wrap;gap:14px">
      <span style="font-size:13px;color:#5B6473;font-weight:600">采集周期</span>
      <div style="display:flex;gap:8px">${["今日","本周","本月","本季度"].map(p=>`<button class="pd ${st.period===p?'on':''}" onclick="app.setPeriod('${p}')">${p}</button>`).join("")}</div>
      <button class="btn" onclick="app.pull()">一键拉取（${st.period}）</button>
    </div>
    <div style="display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-top:14px;padding-top:13px;border-top:1px solid #F0F1F4">
      <span style="font-size:13px;color:#5B6473;font-weight:600">分类</span>
      ${cats.map(c=>`<span class="chip ${st.cat===c?'on':''}" onclick="app.setCat('${c}')">${c}</span>`).join("")}
    </div>
  </div>${body}`;
}

function kbTableRows(){
  let items = allItems();
  if(S.kb.cat!=="全部") items = items.filter(i=>i.category===S.kb.cat);
  if(S.kb.q.trim()){
    const hits = retrieve(S.kb.q, 30); const ids=new Set(hits.map(h=>h.it.id));
    items = items.filter(i=>ids.has(i.id));
    const order = new Map(hits.map((h,idx)=>[h.it.id,idx]));
    items.sort((a,b)=>(order.get(a.id)??99)-(order.get(b.id)??99));
  }
  if(!items.length) return `<div style="padding:40px;text-align:center;color:#9AA1AF;font-size:13px">未匹配到内容</div>`;
  return items.map(k=>`<div style="display:grid;grid-template-columns:2.6fr .7fr 1fr 1.2fr .9fr .7fr;gap:12px;padding:14px 20px;border-bottom:1px solid #F2F3F6;align-items:center">
    <div style="font-size:13.5px;color:#1A2233;font-weight:500;line-height:1.45">${it_link(k)}</div>
    <div style="font-size:12px"><span class="badge" style="${catBadge(k.category)}">${k.category}</span></div>
    <div style="font-size:12px;color:#8B93A3">${esc(k.source||"—")}</div>
    <div style="display:flex;gap:5px;flex-wrap:wrap">${(k.tags||[]).slice(0,2).map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</div>
    <div><span style="display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:600;color:#0E7A54;background:#E6F6EF">已入库</span></div>
    <div style="font-size:12px;color:#8B93A3">${esc(k.date||"—")}</div></div>`).join("");
}
function it_link(k){ return k.url?`<a href="${esc(k.url)}" target="_blank" rel="noopener">${esc(k.title)}</a>`:esc(k.title); }
function viewKb(){
  const cats=["全部","竞品","行业","政策","客户","消费者"];
  return `
  <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px">
    <div><h1>知识库</h1><div style="margin-top:6px;font-size:13px;color:#8B93A3">全部情报统一沉淀，支持检索与 RAG 问答调用 · 共 ${allItems().length} 条</div></div>
    <button class="btn" onclick="app.openModal()">＋ 添加内容</button></div>
  <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
    <div style="display:flex;gap:9px;flex-wrap:wrap">${cats.map(c=>`<span class="chip ${S.kb.cat===c?'on':''}" onclick="app.setKbCat('${c}')">${c}</span>`).join("")}</div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #E8EAEF;border-radius:10px;padding:0 12px;height:36px;width:280px">
      <svg width="14" height="14" viewBox="0 0 18 18" fill="none" stroke="#9AA1AF" stroke-width="1.6"><circle cx="8" cy="8" r="5"/><line x1="12" y1="12" x2="16" y2="16" stroke-linecap="round"/></svg>
      <input id="kbSearch" placeholder="检索标题 / 摘要 / 标签…" value="${esc(S.kb.q)}" oninput="app.kbSearch(this.value)" style="border:none;background:transparent;flex:1;font-size:13px"/>
    </div>
  </div>
  <div class="card" style="overflow:hidden">
    <div style="display:grid;grid-template-columns:2.6fr .7fr 1fr 1.2fr .9fr .7fr;gap:12px;padding:12px 20px;background:#FAFBFC;border-bottom:1px solid #EDEFF3;font-size:12px;font-weight:600;color:#8B93A3">
      <div>名称</div><div>分类</div><div>来源</div><div>标签</div><div>状态</div><div>日期</div></div>
    <div id="kbBody">${kbTableRows()}</div>
  </div>`;
}

function msgNode(m){
  const isUser = m.role==="user";
  const cites = (m.cites&&m.cites.length)? `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">${m.cites.map(c=>
    `<a href="${esc(c.url||'#')}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:#4B69B8;background:#fff;border:1px solid #D6E1FC;border-radius:7px;padding:4px 9px"><b style="color:${AC}">[${c.n}]</b>${esc(c.label)}</a>`).join("")}</div>`:"";
  return `<div style="display:flex;justify-content:${isUser?'flex-end':'flex-start'};margin-bottom:16px"><div style="max-width:78%">
    <div style="padding:12px 16px;border-radius:${isUser?'14px 14px 4px 14px':'14px 14px 14px 4px'};font-size:14px;line-height:1.75;white-space:pre-wrap;color:${isUser?'#fff':'#22293A'};background:${isUser?AC:'#fff'};border:${isUser?'none':'1px solid #E8EAEF'}">${esc(m.text)}</div>${cites}</div></div>`;
}
function viewChat(){
  const quicks = ["本季度竞品有哪些融资或新产品动作？","美妆甲方客户在 AI 营销上有什么动作？","最新的投放平台政策有哪些变化？","小红书和消费者有什么新趋势？"];
  return `
  <div class="card" style="display:flex;flex-direction:column;height:calc(100vh - 168px);overflow:hidden">
    <div style="flex:none;padding:16px 22px;border-bottom:1px solid #EDEFF3;display:flex;align-items:center;justify-content:space-between">
      <div><div style="font-size:16px;font-weight:700">智能问答</div>
        <div style="font-size:12px;color:#8B93A3;margin-top:3px">基于知识库的 RAG 检索问答，回答附引用来源${window.RAG_CONFIG&&window.RAG_CONFIG.endpoint?"（生成式已开启）":"（抽取式 · 零后端）"}</div></div>
      <span style="font-size:11px;font-weight:600;color:#12306E;background:#EAF0FE;border-radius:20px;padding:5px 11px">RAG · 已入库 ${allItems().length} 条</span></div>
    <div id="chatScroll" style="flex:1;overflow:auto;padding:22px 24px;background:#F7F8FA">
      ${S.chat.msgs.map(msgNode).join("")}
      ${S.chat.thinking?`<div style="display:flex;justify-content:flex-start;margin-bottom:16px"><div style="padding:14px 16px;border-radius:14px 14px 14px 4px;background:#fff;border:1px solid #E8EAEF;display:flex;gap:5px"><span style="width:7px;height:7px;border-radius:50%;background:#B7BEC9;animation:blink 1.2s infinite"></span><span style="width:7px;height:7px;border-radius:50%;background:#B7BEC9;animation:blink 1.2s infinite .2s"></span><span style="width:7px;height:7px;border-radius:50%;background:#B7BEC9;animation:blink 1.2s infinite .4s"></span></div></div>`:""}
    </div>
    <div style="flex:none;padding:14px 22px 16px;border-top:1px solid #EDEFF3">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:11px">${quicks.map(q=>`<button onclick="app.ask(${JSON.stringify(q).replace(/"/g,'&quot;')})" style="padding:7px 13px;border-radius:20px;border:1px solid #E1E5EC;background:#fff;color:#5B6473;font-size:12.5px;cursor:pointer">${esc(q)}</button>`).join("")}</div>
      <div style="display:flex;gap:10px;align-items:center">
        <input id="chatInput" placeholder="向知识库提问，回车发送…" onkeydown="if(event.key==='Enter')app.sendChat()" style="flex:1;height:42px;border:1px solid #E1E5EC;border-radius:11px;padding:0 15px;font-size:14px"/>
        <button class="btn" style="height:42px;padding:0 22px;border-radius:11px" onclick="app.sendChat()">发送</button></div>
      <div style="font-size:11px;color:#AAB0BC;margin-top:9px">回答仅基于已入库内容；配置 RAG_CONFIG.endpoint 后可切换为大模型生成式回答。</div>
    </div>
  </div>`;
}

function viewAccess(){
  const mk=(name,cells)=>`<div style="display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr 1fr;gap:8px;padding:13px 20px;border-bottom:1px solid #F2F3F6;align-items:center">
    <div style="font-size:13px;color:#1A2233;font-weight:500">${name}</div>
    ${cells.map(ok=>`<div style="text-align:center;font-size:14px;color:${ok?'#0E9F6E':'#C9CDD6'};font-weight:${ok?700:400}">${ok?'✓':'—'}</div>`).join("")}</div>`;
  return `
  <div style="margin-bottom:20px"><h1>权限与成员</h1><div style="margin-top:6px;font-size:13px;color:#8B93A3">仅面向品牌、融资部门开放，其他部门默认拒绝访问</div></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px">
    ${[["品牌部","已开通 · 4 人"],["融资部","已开通 · 3 人"]].map(([n,s])=>`<div class="card" style="padding:20px 22px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><span style="font-size:15px;font-weight:700">${n}</span>
        <span style="font-size:12px;color:#0E7A54;background:#E6F6EF;border-radius:20px;padding:4px 11px;font-weight:600">${s}</span></div>
      <div style="font-size:12.5px;color:#6A7280;line-height:1.6">可见范围：全部情报 · 全部知识库 · RAG 问答</div></div>`).join("")}
  </div>
  <div class="card" style="overflow:hidden">
    <div style="display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr 1fr;gap:8px;padding:13px 20px;background:#FAFBFC;border-bottom:1px solid #EDEFF3;font-size:12px;font-weight:600;color:#8B93A3">
      <div>权限项</div><div style="text-align:center">管理员(IR)</div><div style="text-align:center">品牌部</div><div style="text-align:center">融资部</div><div style="text-align:center">只读访客</div></div>
    ${mk("查看情报",[1,1,1,1])}${mk("管理知识库",[1,1,1,0])}${mk("RAG 智能问答",[1,1,1,1])}${mk("配置数据源",[1,0,0,0])}${mk("邀请成员",[1,0,0,0])}
  </div>
  <div style="margin-top:14px;font-size:12px;color:#9AA1AF">默认拒绝：非品牌 / 融资部门成员无法访问本中台任何模块。</div>`;
}

function modalHtml(){
  if(!S.modal) return "";
  return `<div onclick="app.closeModal()" style="position:fixed;inset:0;background:rgba(16,24,43,.42);display:flex;align-items:center;justify-content:center;z-index:50">
    <div onclick="event.stopPropagation()" style="width:520px;max-width:92vw;background:#fff;border-radius:16px;padding:24px;box-shadow:0 24px 60px rgba(16,24,43,.28)">
      <div style="font-size:17px;font-weight:700;margin-bottom:4px">添加到知识库</div>
      <div style="font-size:13px;color:#8B93A3;margin-bottom:18px">粘贴链接或输入标题，先入库供检索；正式解析由后端 ingest.py 完成（自动摘要 / 打标签）</div>
      <input id="mUrl" placeholder="https://…  或  文档 / 情报标题" style="width:100%;height:44px;border:1px solid #E1E5EC;border-radius:11px;padding:0 15px;font-size:14px;margin-bottom:10px"/>
      <div style="display:flex;gap:8px;margin-bottom:10px;align-items:center"><span style="font-size:12px;color:#8B93A3">分类</span>
        ${["竞品","行业","政策","客户","消费者"].map((c,i)=>`<label style="font-size:12px;color:#5B6473;display:inline-flex;gap:4px;align-items:center"><input type="radio" name="mcat" value="${c}" ${i===0?'checked':''}/>${c}</label>`).join("")}</div>
      <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:14px">
        <button class="btn out" onclick="app.closeModal()">取消</button>
        <button class="btn" onclick="app.addKb()">入库</button></div>
    </div></div>`;
}

// ---------- render ----------
function render(){
  renderNav();
  const main = document.getElementById("main");
  let html = "";
  if(S.view==="overview") html=viewOverview();
  else if(S.view==="intel") html=viewIntel();
  else if(S.view==="kb") html=viewKb();
  else if(S.view==="chat") html=viewChat();
  else if(S.view==="access") html=viewAccess();
  main.innerHTML = html + modalHtml();
  if(S.view==="chat"){ const sc=document.getElementById("chatScroll"); if(sc) sc.scrollTop=sc.scrollHeight; const ci=document.getElementById("chatInput"); if(ci) ci.focus(); }
  const ds=document.getElementById("dataStamp"); if(ds) ds.textContent="知识库 "+allItems().length+" 条 · "+(META.generated||"");
}

// ---------- app actions ----------
window.app = {
  go(v){ S.view=v; render(); },
  setPeriod(p){ S.intel.period=p; render(); },
  setCat(c){ S.intel.cat=c; if(S.intel.status==="done") S.intel.results=filterIntel(S.intel.period,S.intel.cat); render(); },
  pull(){ if(S.intel.status==="loading")return; S.intel.status="loading"; render(); setTimeout(()=>{ S.intel.results=filterIntel(S.intel.period,S.intel.cat); S.intel.status="done"; render(); },800); },
  star(id){ if(LS.stars.has(id))LS.stars.delete(id); else LS.stars.add(id); persist.stars(); render(); },
  setKbCat(c){ S.kb.cat=c; render(); },
  kbSearch(v){ S.kb.q=v; const b=document.getElementById("kbBody"); if(b)b.innerHTML=kbTableRows(); },
  openModal(){ S.modal=true; render(); setTimeout(()=>{const e=document.getElementById("mUrl");if(e)e.focus();},30); },
  closeModal(){ S.modal=false; render(); },
  addKb(){
    const v=(document.getElementById("mUrl").value||"").trim(); if(!v)return;
    const cat=(document.querySelector('input[name=mcat]:checked')||{}).value||"待分类";
    const isUrl=/^https?:\/\//i.test(v);
    const item={ id:"u"+Date.now(), category:cat, company:"", title:isUrl?("手动收录："+v.slice(0,40)):(v.length>46?v.slice(0,46)+"…":v),
      source:"手动添加", url:isUrl?v:"", date:new Date().toISOString().slice(0,10), summary:"（待后端解析摘要）", body:v, tags:["待复核"] };
    LS.added.unshift(item); persist.added(); _index=null; S.modal=false; S.view="kb"; render();
  },
  async ask(q){
    q=(q||"").trim(); if(!q||S.chat.thinking)return;
    S.chat.msgs.push({role:"user",text:q,cites:[]}); S.chat.thinking=true; LS.qc++; persist.qc(); render();
    const a=await answer(q);
    S.chat.thinking=false; S.chat.msgs.push({role:"assistant",text:a.text,cites:a.cites}); render();
  },
  sendChat(){ const el=document.getElementById("chatInput"); if(el){ const v=el.value; el.value=""; this.ask(v); } },
};

// top search → jump to KB with query
document.getElementById("topSearch").addEventListener("keydown",e=>{ if(e.key==="Enter"){ S.kb.q=e.target.value; S.view="kb"; render(); }});

render();
</script>
</body>
</html>
